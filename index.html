<!DOCTYPE html>
<html lang="cs">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skleník - Grafy Teploty</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

</head>

<body class="bg-light">

  <div id="top-panel-wrap">

    <!-- Ovládání výsuvného panelu -->
    <div id="panel-tab">
      <span class="arrow">▼</span>
    </div>

    <!-- Výsuvný panel -->
    <div id="top-panel">

      <h5>Časový interval</h5>

      <div id="time-controls" class="btn-group mb-3 w-100">
        <button class="btn btn-outline-primary" data-range="24h">24 h</button>
        <button class="btn btn-outline-primary" data-range="3d">3 dny</button>
        <button class="btn btn-outline-primary" data-range="7d">Týden</button>
        <button class="btn btn-outline-primary" data-range="30d">Měsíc</button>
      </div>

      <div class="row g-2 mb-3">
        <div class="col">
          <label class="form-label">Od:</label>
          <input type="date" id="startInput" class="form-control" required>
        </div>

        <div class="col">
          <label class="form-label">Do:</label>
          <input type="date" id="endInput" class="form-control" required>
        </div>
      </div>

      <button id="applyRange" class="btn btn-primary w-100">Zobrazit</button>

    </div>

  </div>

  <!-- Obsah stránky -->
  <div class="container-fluid p-3">
    <div id="graf_temperature" class="graf-box"></div>
    <div id="graf_humidity" class="graf-box"></div>
    <div id="graf_illumination" class="graf-box"></div>
    <div id="graf_pressure" class="graf-box"></div>
  </div>

  <div id="loading-overlay" class="d-none">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <script src="app.js"></script>

</body>

</html>
